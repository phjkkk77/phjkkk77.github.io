<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2025 한화 vs 롯데 비교</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <section id="hero" class="hero-stage">
    <div class="hero-sticky">
      <p class="hero-tag">2025 KBO REGULAR SEASON</p>
      <h1 class="hero-title">HANWHA EAGLES vs LOTTE GIANTS</h1>

      <div class="logo-arena">
        <div id="hanwhaLogo" class="team-logo left">
          <img src="https://www.statiz.co.kr/data/team/ci/2026/7002.svg" alt="한화 이글스 로고" />
          <span>HANWHA EAGLES</span>
        </div>

        <div id="lotteLogo" class="team-logo right">
          <img src="https://www.statiz.co.kr/data/team/ci/2026/3001.svg" alt="롯데 자이언츠 로고" />
          <span>LOTTE GIANTS</span>
        </div>
      </div>
    </div>
  </section>

  <main class="compare-wrap">
    <header class="section-head reveal-item">
      <h2>한화 vs 롯데 기록 비교</h2>
      <p>좌측은 한화, 우측은 롯데 기록입니다. 헤더 클릭 정렬과 더보기 버튼으로 선수 기록을 탐색할 수 있습니다.</p>
    </header>

    <section class="split-row reveal-item" id="row-headtohead">
      <article class="split-card hanwha" id="headtohead-left"></article>
      <article class="split-card lotte" id="headtohead-right"></article>
    </section>

    <section class="split-row reveal-item" id="row-hitters">
      <article class="split-card hanwha" id="hitters-left"></article>
      <article class="split-card lotte" id="hitters-right"></article>
    </section>

    <section class="split-row reveal-item" id="row-pitchers">
      <article class="split-card hanwha" id="pitchers-left"></article>
      <article class="split-card lotte" id="pitchers-right"></article>
    </section>

    <section class="split-row reveal-item" id="row-strongest">
      <article class="split-card hanwha" id="strong-left"></article>
      <article class="split-card lotte" id="strong-right"></article>
    </section>
  </main>

  <footer class="copyright">
    <p>All baseball records and data are provided by the Korean Baseball Organization (KBO). © KBO. All rights reserved.</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
